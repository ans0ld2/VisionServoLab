name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Check lockfile
        run: uv lock --check

      - name: Run unit tests
        run: uv run python -m unittest discover -s tests -v

      - name: Check whitespace
        run: git diff --check

